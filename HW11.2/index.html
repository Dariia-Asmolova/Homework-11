<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@100&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body background="src/Group 3 copy.png">
    <div class="container">
        <div class="content">
            <img class="content__logo" src="src/logo.png" alt="">
            <img class="content__img" src="src/Nike-SB-Stefan-Janoski-Max.png" alt="">
            <h1 class="content__title">Nike SB Stefan Janoski Max</h1>
            <p class="content__text">Unisex Skateboarding Shoe</p>

            <div class="content__icon">
            <ul class="content__icon-list">
                <li><i class="far fa-star"></i></li>
                <li><i class="far fa-star"></i></li>
                <li><i class="far fa-star"></i></li>
                <li><i class="far fa-star"></i></li>
                <li><i class="far fa-star"></i></li>
            </ul>
            </div>

            <div class="content__rectangle">
            <span class="content__size">Size</span>
            <span class="content__qty">Qty</span>
            </div>

            <div class="content__button-holder">
                <button class="button">Add to cart</button>
            </div>

            <div class="content__bullets">
                <ul class="content__bullets-list">
                    <li><img src="src/Ellipse 1 copy 3.svg" alt=""></li>
                    <li><img src="src/Ellipse 1.svg" alt=""></li>
                    <li><img src="src/Ellipse 1 copy.svg" alt=""></li>
                    <li><img src="src/Ellipse 1 copy 2.svg" alt=""></li>
                </ul>
            </div>
        </div>
    </div>
    
</body>
</html>
